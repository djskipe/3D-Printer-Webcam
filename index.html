<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Monitor Ultra-Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .box { padding: 10px; background: #111; border: 1px solid #333; margin: 10px; }
        button { padding: 15px; width: 90%; margin: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #log { font-size: 11px; padding: 10px; text-align: left; height: 150px; overflow-y: auto; border-bottom: 1px solid #333; }
        video { width: 100%; max-width: 600px; background: #000; }
    </style>
</head>
<body>

    <div id="log">SYSTEM READY. USA HTTPS!</div>
    <video id="v" autoplay playsinline muted></video>

    <div class="box">
        <button style="background: #c0392b; color: white;" onclick="startCamera()">1. AVVIA TELEFONO (RETRO)</button>
        <button style="background: #2980b9; color: white;" onclick="startPC()">2. AVVIA PC (RICEVI)</button>
    </div>

    <script>
        const ID_STAMPANTE = "STAMPANTE_PRO_XYZ_123";
        // Configurazione per saltare i blocchi dei router (Server Google)
        const config = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]
        };

        const log = (msg) => { 
            const l = document.getElementById('log');
            l.innerHTML += "<br>> " + msg;
            l.scrollTop = l.scrollHeight;
        };
        const v = document.getElementById('v');
        let peer;

        async function startCamera() {
            log("Accesso camera posteriore...");
            try {
                // Proviamo a forzare la camera posteriore
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } }, 
                    audio: false 
                });
                v.srcObject = stream;
                log("Camera OK sul telefono.");

                peer = new Peer(ID_STAMPANTE, { config: config });
                
                peer.on('open', (id) => log("ONLINE! In attesa del PC..."));
                peer.on('call', (call) => {
                    log("Chiamata ricevuta! Invio video...");
                    call.answer(stream);
                });
                
                peer.on('error', (err) => log("ERRORE: " + err.type));
            } catch (e) {
                log("ERRORE CAMERA: " + e.message);
            }
        }

        function startPC() {
            log("Connessione...");
            peer = new Peer({ config: config });

            peer.on('open', () => {
                log("PC pronto. Chiamo la stampante...");
                // Creiamo una chiamata "pulita"
                const call = peer.call(ID_STAMPANTE, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    log("!!! VIDEO RICEVUTO !!!");
                    v.srcObject = remoteStream;
                    v.play();
                });
            });

            peer.on('error', (err) => log("ERRORE PC: " + err.type));
        }
    </script>
</body>
</html>
