<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Hub - Monitor</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .menu { text-align: center; background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        button { margin: 10px; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-stream { background: #e74c3c; color: white; }
        .btn-view { background: #3498db; color: white; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        .status-bar { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; z-index: 100; font-size: 12px; }
        select { padding: 10px; margin-bottom: 10px; width: 100%; border-radius: 5px; background: #333; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="setup-menu" class="menu">
        <h1>3D Print Monitor</h1>
        <p>Cosa vuoi fare con questo dispositivo?</p>
        
        <div id="camera-options" class="hidden">
            <select id="camera-select"></select>
        </div>

        <button class="btn-stream" onclick="setupStreamer()">Metti in Streaming (Telefono)</button>
        <button class="btn-view" onclick="setupReceiver()">Guarda Monitor (PC)</button>
    </div>

    <div id="video-container" class="hidden" style="width: 100%; height: 100%;">
        <div class="status-bar" id="status">Inizializzazione...</div>
        <video id="main-video" autoplay playsinline muted></video>
    </div>

    <script>
        const ID_FISSO = 'STAMPANTE-3D-MIA'; // Questo è il "canale" comune
        const peer = new Peer();
        const videoElement = document.getElementById('main-video');
        const setupMenu = document.getElementById('setup-menu');
        const videoContainer = document.getElementById('video-container');
        const statusEl = document.getElementById('status');
        const cameraSelect = document.getElementById('camera-select');

        // Carica le camere appena il sito si apre (serve per il telefono)
        async function loadCameras() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                videoDevices.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.text = d.label || `Camera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(opt);
                });
                document.getElementById('camera-options').classList.remove('hidden');
            } catch (e) { console.log("Permessi camera non ancora concessi"); }
        }
        loadCameras();

        // --- FUNZIONE STREAMER (TELEFONO) ---
        async function setupStreamer() {
            // Riavvia il Peer con l'ID fisso per farsi trovare
            peer.destroy();
            const streamerPeer = new Peer(ID_FISSO);
            
            streamerPeer.on('open', async () => {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: cameraSelect.value } },
                    audio: false
                });
                videoElement.srcObject = stream;
                showVideoUI("🔴 TRASMETTENDO... (ID: " + ID_FISSO + ")");
                
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen');

                streamerPeer.on('call', (call) => {
                    call.answer(stream); // Invia il video a chi chiama (il PC)
                });
            });
        }

        // --- FUNZIONE RICEVITORE (PC) ---
        function setupReceiver() {
            showVideoUI("Connessione alla stampante...");
            
            // Il PC prova a chiamare l'ID fisso ogni 3 secondi finché non risponde
            const tryConnect = () => {
                const call = peer.call(ID_FISSO, new MediaStream());
                call.on('stream', (remoteStream) => {
                    videoElement.srcObject = remoteStream;
                    videoElement.muted = false; // Se vuoi l'audio della stampa
                    statusEl.innerText = "🔵 MONITORAGGIO ATTIVO";
                });
                call.on('error', () => setTimeout(tryConnect, 3000));
            };
            
            setTimeout(tryConnect, 1000);
        }

        function showVideoUI(msg) {
            setupMenu.classList.add('hidden');
            videoContainer.classList.remove('hidden');
            statusEl.innerText = msg;
        }
    </script>
</body>
</html>
