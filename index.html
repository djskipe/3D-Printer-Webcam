<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Monitor - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .box { padding: 15px; background: #222; margin: 10px; border-radius: 10px; }
        button { padding: 15px; width: 90%; margin: 5px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        #log { font-size: 11px; color: #0f0; background: #000; padding: 10px; margin: 5px; text-align: left; height: 120px; overflow-y: auto; border: 1px solid #333; }
        video { width: 100%; max-width: 600px; background: #111; border-bottom: 2px solid #e74c3c; }
    </style>
</head>
<body>

    <video id="v" autoplay playsinline muted></video>
    
    <div id="log">Status: Pronto. Carica il sito su HTTPS!</div>

    <div class="box">
        <button style="background: #e74c3c;" onclick="startAsCamera()">1. TELEFONO (Invia Video Retro)</button>
        <button style="background: #3498db;" onclick="startAsPC()">2. PC (Ricevi Video)</button>
        <button style="background: #555;" onclick="location.reload()">Reset Pagina</button>
    </div>

    <script>
        const ID_STAMPANTE = "MIA_STAMPANTE_3D_XYZ"; // ID univoco
        const log = (msg) => { 
            const l = document.getElementById('log');
            l.innerHTML += "<br>> " + msg;
            l.scrollTop = l.scrollHeight;
        };
        const v = document.getElementById('v');
        let localStream;

        // --- FUNZIONE TELEFONO (STREAMER) ---
        async function startAsCamera() {
            log("Accesso alla camera posteriore...");
            try {
                // Forziamo la camera posteriore (environment)
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } }, 
                    audio: false 
                }).catch(async () => {
                    log("Camera 'environment' non trovata, provo standard...");
                    return await navigator.mediaDevices.getUserMedia({ video: true });
                });

                v.srcObject = localStream;
                log("Camera attiva sul telefono.");

                const peer = new Peer(ID_STAMPANTE);
                
                peer.on('open', (id) => log("Telefono Online! Aspetto il PC..."));
                
                peer.on('call', (call) => {
                    log("Chiamata ricevuta! Invio video...");
                    call.answer(localStream); 
                });

                peer.on('error', (err) => log("Errore Peer: " + err.type));

            } catch (e) {
                log("ERRORE: " + e.message);
                alert("Errore camera. Assicurati di essere in HTTPS!");
            }
        }

        // --- FUNZIONE PC (RECEIVER) ---
        function startAsPC() {
            log("Connessione in corso...");
            const peer = new Peer(); 

            peer.on('open', () => {
                log("PC pronto. Cerco la stampante...");
                // Il PC deve inviare un "finto stream" per attivare la risposta
                const call = peer.call(ID_STAMPANTE, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    log("!!! VIDEO RICEVUTO !!!");
                    v.srcObject = remoteStream;
                    v.play(); // Forza l'avvio del video
                });
            });

            peer.on('error', (err) => log("Errore PC: " + err.type));
            
            setTimeout(() => {
                if (!v.srcObject) log("Ancora niente... controlla che il telefono sia in 'TRASMISSIONE'");
            }, 6000);
        }
    </script>
</body>
</html>
