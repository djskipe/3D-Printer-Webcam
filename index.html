<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Monitor FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; text-align: center; }
        .box { padding: 20px; border: 1px solid #333; margin: 10px; border-radius: 10px; }
        button { padding: 15px; width: 80%; margin: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #log { font-size: 12px; color: #0f0; background: #000; padding: 10px; margin: 10px; text-align: left; height: 100px; overflow-y: scroll; }
        video { width: 90%; max-width: 600px; background: #000; border: 2px solid #444; }
    </style>
</head>
<body>

    <h2>3D PRINT HUB - FIX</h2>
    
    <div id="log">Status: In attesa di comando...</div>

    <div id="controls">
        <div class="box">
            <button style="background: #e74c3c;" onclick="startAsCamera()">1. AVVIA COME TELEFONO</button>
        </div>
        <div class="box">
            <button style="background: #3498db;" onclick="startAsPC()">2. AVVIA COME PC (Guarda)</button>
        </div>
    </div>

    <video id="v" autoplay playsinline muted></video>

    <script>
        const ID_STAMPANTE = "STAMPANTE_3D_DI_PRO"; // ID FISSO
        const log = (msg) => { document.getElementById('log').innerHTML += "<br>> " + msg; };
        const v = document.getElementById('v');
        let peer;

        // --- FUNZIONE TELEFONO ---
        async function startAsCamera() {
            log("Inizializzazione Camera...");
            peer = new Peer(ID_STAMPANTE);
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                v.srcObject = stream;
                log("Camera attiva localmente.");

                peer.on('open', (id) => log("Telefono Online! ID: " + id));
                peer.on('call', (call) => {
                    log("Ricevuta chiamata dal PC! Rispondo...");
                    call.answer(stream);
                });
                peer.on('error', (err) => log("Errore: " + err.type));
            } catch (e) {
                log("ERRORE CAMERA: " + e.message);
                alert("Devi usare HTTPS e dare i permessi!");
            }
        }

        // --- FUNZIONE PC ---
        function startAsPC() {
            log("Inizializzazione PC...");
            peer = new Peer(); // ID Casuale per il PC

            peer.on('open', () => {
                log("PC pronto. Chiamo la stampante...");
                const call = peer.call(ID_STAMPANTE, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    log("STREAM RICEVUTO! Connessione riuscita.");
                    v.srcObject = remoteStream;
                    v.muted = false;
                });

                setTimeout(() => {
                    if (!v.srcObject) log("Nessuna risposta... il telefono è acceso?");
                }, 5000);
            });

            peer.on('error', (err) => log("Errore PC: " + err.type));
        }
    </script>
</body>
</html>
