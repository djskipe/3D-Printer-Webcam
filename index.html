<!DOCTYPE html>
<html lang="it">
<head>
<style>
    .embedded #role-selection, .embedded #debug-log, .embedded h2 { display: none; }
    .embedded video { width: 100vw; height: 100vh; object-fit: cover; margin: 0; border: none; border-radius: 0; }
    body.embedded { padding: 0; overflow: hidden; background: black; }
</style>

<script>
    // Se aggiungi ?view=embed all'URL, la pagina diventa "solo video"
    if (window.location.search.includes('view=embed')) {
        document.body.classList.add('embedded');
        // Auto-avvio per il PC quando incorporato
        window.onload = () => { initRiproduttore(); setTimeout(connettiACamera, 2000); };
    }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Monitor - Auto Reverse</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        video { width: 100%; background: #000; border-radius: 12px; border: 2px solid #333; margin-top: 15px; }
        .btn { padding: 20px; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px; }
        .btn-reg { background: #e67e22; color: white; }
        .btn-rip { background: #2980b9; color: white; }
        #debug-log { background: #000; color: #00ff00; font-family: monospace; padding: 10px; height: 180px; overflow-y: scroll; font-size: 11px; border: 1px solid #333; text-align: left; margin-top: 20px; border-radius: 8px; }
        .hidden { display: none; }
        .status { color: #f1c40f; font-weight: bold; margin: 10px 0; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h2>3D Print Monitor v4</h2>

        <div id="role-selection">
            <button class="btn btn-reg" onclick="initRegistratore()">🎥 IMPOSTA COME REGISTRATORE<br><small>(iPhone a casa - TRASMETTE)</small></button>
            <button class="btn btn-rip" onclick="initRiproduttore()">💻 IMPOSTA COME RIPRODUTTORE<br><small>(PC ufficio/viaggio - RICEVE)</small></button>
        </div>

        <div id="ui-display" class="hidden">
            <div class="status" id="status-text">Inizializzazione...</div>
            <video id="v-main" autoplay playsinline muted></video>
        </div>

        <div id="debug-log">Seleziona un ruolo...</div>
    </div>

    <script>
        const ID_CAMERA = "STAMPANTE_3D_IPHONE";
        const ID_MONITOR = "STAMPANTE_3D_PC";
        
        const logBox = document.getElementById('debug-log');
        const statusText = document.getElementById('status-text');
        const videoEl = document.getElementById('v-main');
        let peer, localStream, currentCall;

        function log(msg) {
            logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        const peerConfig = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'turn:openrelay.metered.ca:80', 'username': 'openrelayproject', 'credential': 'openrelayproject' }
            ]
        };

        // --- LATO IPHONE (REGISTRATORE) ---
        async function initRegistratore() {
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('ui-display').classList.remove('hidden');
            log("Configurazione Registratore...");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                videoEl.srcObject = localStream;
                log("🎥 Camera OK.");

                peer = new Peer(ID_CAMERA, { config: peerConfig, debug: 1 });

                peer.on('open', (id) => {
                    log("✅ Registratore Online.");
                    statusText.innerText = "CERCO IL PC...";
                    // Inizia a "bussare" al PC ogni 5 secondi
                    setInterval(tentativoChiamata, 5000);
                });

                peer.on('error', (err) => log("⚠️ Peer Status: " + err.type));

            } catch (e) { log("❌ Errore Camera: " + e.message); }
        }

        function tentativoChiamata() {
            if (currentCall && currentCall.open) return; // Se siamo già in chiamata, non fare nulla

            log("📡 Cerco di inviare video al PC...");
            const call = peer.call(ID_MONITOR, localStream);
            
            if (call) {
                currentCall = call;
                call.on('stream', () => {
                    log("🔗 Collegato al PC!");
                    statusText.innerText = "🔴 IN TRASMISSIONE";
                });
                call.on('close', () => {
                    log("🔌 PC scollegato.");
                    statusText.innerText = "CERCO IL PC...";
                    currentCall = null;
                });
            }
        }

        // --- LATO PC (RIPRODUTTORE) ---
        function initRiproduttore() {
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('ui-display').classList.remove('hidden');
            log("Configurazione Monitor...");

            peer = new Peer(ID_MONITOR, { config: peerConfig, debug: 1 });

            peer.on('open', (id) => {
                log("✅ Monitor Online. In attesa di segnale dall'iPhone...");
                statusText.innerText = "IN ATTESA DELLA CAMERA...";
            });

            peer.on('call', (call) => {
                log("📞 Camera trovata! Ricezione video...");
                call.answer(); // Risponde alla chiamata dell'iPhone
                
                call.on('stream', (remoteStream) => {
                    log("📺 VIDEO RICEVUTO!");
                    statusText.innerText = "🟢 DIRETTA ATTIVA";
                    videoEl.srcObject = remoteStream;
                    videoEl.muted = false; // Se vuoi l'audio
                    videoEl.play();
                });
            });

            peer.on('error', (err) => log("❌ Errore: " + err.type));
        }
    </script>
</body>
</html>
