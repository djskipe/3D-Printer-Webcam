<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Monitor PRO - Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; overflow: hidden; }
        #status { background: rgba(0,0,0,0.8); padding: 12px; position: fixed; top:0; width: 100%; z-index: 100; font-size: 13px; border-bottom: 1px solid #333; }
        video { width: 100vw; height: 100vh; object-fit: contain; background: #000; }
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 100; }
        button { padding: 18px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-cam { background: #e74c3c; color: white; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }
        .btn-pc { background: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4); }
        button:active { transform: scale(0.95); }
        #log { display: none; } /* Nascondi area log */
    </style>
</head>
<body>

    <div id="status">SISTEMA PRONTO - USA HTTPS</div>
    
    <video id="v" autoplay playsinline muted></video>

    <div class="controls" id="ui">
        <button class="btn-cam" onclick="startStreamer()">TELEFONO (Trasmetti)</button>
        <button class="btn-pc" onclick="startReceiver()">PC (Ricevi)</button>
    </div>

    <script>
        // --- CONFIGURAZIONE CANALE ---
        const CANALE_UNICO = "MIA_STAMPANTE_3D_XYZ_2024"; 
        
        // Server STUN di Google
        const peerConfig = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' }
            ]
        };

        const v = document.getElementById('v');
        const status = document.getElementById('status');
        const ui = document.getElementById('ui');

        // Funzione di log visibile (opzionale)
        function log(msg) {
            console.log(msg);
            // Puoi anche mostrare in un elemento se vuoi
        }

        // --- TRASMETTITORE (TELEFONO) ---
        async function startStreamer() {
            ui.style.display = 'none';
            status.innerText = "Accesso camera posteriore...";
            
            try {
                // Richiedi camera posteriore
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { ideal: "environment" } }, 
                    audio: false 
                });
                
                v.srcObject = stream;
                status.innerText = "Camera OK. Inizializzazione segnale...";

                const peer = new Peer(CANALE_UNICO, { config: peerConfig });
                
                peer.on('open', () => {
                    status.style.color = "#ff4d4d";
                    status.innerText = "🔴 IN TRASMISSIONE - Lascia questa pagina aperta";
                });

                peer.on('call', (call) => {
                    status.innerText = "PC CONNESSO! Invio video...";
                    log("Chiamata ricevuta, rispondo con stream");
                    call.answer(stream);
                    
                    // Gestisci chiusura chiamata
                    call.on('close', () => {
                        status.innerText = "PC disconnesso, in attesa...";
                    });
                    
                    call.on('error', (err) => {
                        log("Errore chiamata: " + err);
                    });
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        alert("ID già in uso! Chiudi altre schede aperte.");
                        location.reload();
                    } else {
                        log("Errore peer: " + err);
                    }
                });

                // Mantieni schermo acceso (se supportato)
                if ('wakeLock' in navigator) {
                    try {
                        await navigator.wakeLock.request('screen');
                    } catch (e) {}
                }

            } catch (e) {
                alert("ERRORE: " + e.message + "\nAssicurati di aver dato i permessi e di essere in HTTPS.");
                location.reload();
            }
        }

        // --- RICEVITORE (PC / FLUIDD) ---
        function startReceiver() {
            ui.style.display = 'none';
            status.innerText = "Ricerca segnale stampante...";
            
            const peer = new Peer({ config: peerConfig });
            let currentCall = null; // Riferimento alla chiamata attuale

            peer.on('open', (id) => {
                log("Peer ricevitore aperto con ID: " + id);
                connectToStreamer(peer); // Avvia il primo tentativo
            });

            peer.on('error', (err) => {
                log("Errore peer PC: " + err.type);
                // Se il peer muore, ricrea?
            });

            function connectToStreamer(peer) {
                log("Tentativo di connessione a " + CANALE_UNICO);
                status.innerText = "Tentativo di aggancio...";
                
                // Se c'è già una chiamata attiva, chiudila
                if (currentCall) {
                    currentCall.close();
                }

                // Crea una nuova chiamata (con stream locale vuoto)
                const call = peer.call(CANALE_UNICO, new MediaStream());
                currentCall = call;

                // Timeout per evitare tentativi infiniti
                const timeout = setTimeout(() => {
                    if (!v.srcObject) {
                        log("Timeout, riprovo...");
                        call.close();
                        connectToStreamer(peer); // Riprova
                    }
                }, 10000); // 10 secondi

                call.on('stream', (remoteStream) => {
                    clearTimeout(timeout);
                    status.style.color = "#3498db";
                    status.innerText = "🔵 VIDEO AGGANCIATO - Attendere...";
                    log("Stream remoto ricevuto!");
                    
                    v.srcObject = remoteStream;
                    
                    // Tenta la riproduzione (gestisce autoplay bloccato)
                    const playPromise = v.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            status.innerText = "🔵 VIDEO IN RIPRODUZIONE";
                        }).catch((error) => {
                            // Autoplay bloccato: chiedi interazione utente
                            status.innerText = "CLICCA SUL VIDEO PER ATTIVARE";
                            v.addEventListener('click', function activate() {
                                v.play();
                                v.removeEventListener('click', activate);
                            });
                        });
                    }
                });

                call.on('close', () => {
                    log("Chiamata chiusa");
                    if (currentCall === call) {
                        currentCall = null;
                        v.srcObject = null;
                        status.innerText = "Connessione persa, riprovo...";
                        // Riconnetti dopo un po'
                        setTimeout(() => connectToStreamer(peer), 3000);
                    }
                });

                call.on('error', (err) => {
                    log("Errore chiamata: " + err);
                    if (currentCall === call) {
                        currentCall = null;
                        v.srcObject = null;
                        // Riprova
                        setTimeout(() => connectToStreamer(peer), 3000);
                    }
                });
            }
        }

        // Piccola ottimizzazione: se il video è già stato impostato, non mostrare più i controlli
        // (utile se si ricarica la pagina)
        window.onload = function() {
            if (localStorage.getItem('mode') === 'streamer') {
                startStreamer();
            } else if (localStorage.getItem('mode') === 'receiver') {
                startReceiver();
            }
        };
    </script>
</body>
</html>
