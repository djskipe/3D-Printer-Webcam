<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test WebRTC PeerJS</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        video { width: 100%; max-width: 600px; background: black; }
        button { padding: 10px; margin: 5px; }
        #status { color: blue; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Test WebRTC con PeerJS</h2>
    <p>Usa un ID fisso: <strong>TEST_123</strong></p>
    <button onclick="startStreamer()">📱 TRASMETTI (telefono)</button>
    <button onclick="startReceiver()">🖥️ RICEVI (PC)</button>
    <div id="status">⚪ In attesa</div>
    <video id="video" autoplay playsinline muted></video>

    <script>
        const CHANNEL_ID = "TEST_123"; // stesso ID per entrambi
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        let peer, call;

        function log(msg) {
            document.getElementById('status').innerText = msg;
            console.log(msg);
        }

        // --- TRASMETTITORE (telefono) ---
        async function startStreamer() {
            try {
                log("Richiedo camera...");
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, // posteriore
                    audio: false 
                });
                document.getElementById('video').srcObject = stream;
                log("Camera OK. Creo peer...");

                peer = new Peer(CHANNEL_ID, config);
                peer.on('open', id => log("✅ Trasmettitore attivo con ID: " + id));
                peer.on('call', call => {
                    log("📞 Chiamata in arrivo! Rispondo...");
                    call.answer(stream);
                    call.on('close', () => log("🔴 Chiamata chiusa"));
                });
                peer.on('error', err => log("❌ Errore peer: " + err.type));
            } catch(e) {
                log("❌ ERRORE: " + e.message);
            }
        }

        // --- RICEVITORE (PC) ---
        function startReceiver() {
            log("Creo peer ricevitore...");
            peer = new Peer(config); // ID casuale
            peer.on('open', id => {
                log("✅ Ricevitore aperto con ID: " + id);
                log("📞 Chiamo " + CHANNEL_ID + "...");
                call = peer.call(CHANNEL_ID, new MediaStream());
                
                call.on('stream', remoteStream => {
                    log("🎥 STREAM RICEVUTO! Avvio video...");
                    document.getElementById('video').srcObject = remoteStream;
                    // Prova a riprodurre (autoplay potrebbe essere bloccato)
                    document.getElementById('video').play().catch(e => {
                        log("⚠️ Autoplay bloccato, clicca sul video");
                        document.getElementById('video').addEventListener('click', function play() {
                            document.getElementById('video').play();
                            this.removeEventListener('click', play);
                        });
                    });
                });
                
                call.on('close', () => log("🔴 Chiamata chiusa"));
                call.on('error', err => log("❌ Errore chiamata: " + err.type));
            });
            peer.on('error', err => log("❌ Errore peer: " + err.type));
        }
    </script>
</body>
</html>
