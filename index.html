<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Monitor</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; z-index: 10; }
        button { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; }
    </style>
</head>
<body>

    <div class="overlay">
        ID Camera: <strong id="my-id">...</strong><br>
        <select id="camera-select"></select>
        <button id="start-btn">AVVIA MONITOR</button>
    </div>

    <div id="video-container">
        <video id="view" autoplay playsinline muted></video>
    </div>

    <script>
        const peer = new Peer('STAMPANTE-3D-MIA'); // ID FISSO così non devi cambiarlo in Fluidd
        const videoElement = document.getElementById('view');
        const startBtn = document.getElementById('start-btn');
        const cameraSelect = document.getElementById('camera-select');

        // Carica elenco camere
        async function getCameras() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            videoDevices.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || 'Camera ' + cameraSelect.length;
                cameraSelect.appendChild(opt);
            });
        }

        getCameras();

        // Avvia lo streaming
        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: { exact: cameraSelect.value } },
                audio: false
            });
            videoElement.srcObject = stream;
            startBtn.style.display = 'none';
            
            // Mantieni lo schermo acceso (se supportato)
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen');
            }
        };

        // Rispondi automaticamente alla chiamata dal PC/Fluidd
        peer.on('call', (call) => {
            call.answer(videoElement.srcObject);
            call.on('stream', (remoteStream) => {
                videoElement.srcObject = remoteStream;
            });
        });

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
    </script>
</body>
</html>
